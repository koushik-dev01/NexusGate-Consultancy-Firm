<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - NexusGate International</title>
  <link rel="shortcut icon" href="Assets/site icon.png" type="image/x-icon">
  <style>
    :root {
      --primary-black: #1a1a1a;
      --gold: #d4af37;
      --light-gold: #e8d9b8;
      --white: #f8f8f8;
      --light-gray: #f0f0f0;
      --text-gray: #333333;
      --border-gray: #e0e0e0;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text-gray);
      background-color: var(--white);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background-color: var(--white);
      border-bottom: 2px solid var(--light-gold);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 70px;
    }
    
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary-black);
      text-decoration: none;
      letter-spacing: 1px;
    }
    
    .logo span { color: var(--gold); }
    
    .thank-you-container {
      flex: 1;
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 40px;
      text-align: center;
    }
    
    .thank-you-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--light-gold), var(--gold));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 40px;
      font-size: 48px;
      color: var(--primary-black);
    }
    
    .thank-you-title {
      font-size: 36px;
      font-weight: 700;
      color: var(--primary-black);
      margin-bottom: 20px;
    }
    
    .thank-you-message {
      font-size: 20px;
      color: var(--text-gray);
      margin-bottom: 40px;
      line-height: 1.6;
    }
    
    .user-name {
      color: var(--gold);
      font-weight: 600;
    }
    
    .home-btn {
      background-color: var(--gold);
      color: var(--primary-black);
      padding: 16px 40px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    
    .home-btn:hover {
      background-color: #e8d9b8;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
    }
    
    footer {
      margin-top: auto;
      background-color: var(--primary-black);
      color: var(--white);
      padding: 40px;
      text-align: center;
      border-top: 3px solid var(--gold);
    }
    
    @media (max-width: 768px) {
      .nav-container { padding: 0 20px; }
      .thank-you-container { padding: 60px 20px; }
      .thank-you-title { font-size: 28px; }
      .thank-you-message { font-size: 18px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="nav-container">
      <a href="NexusGate International Website.html" class="logo">Nexus<span>Gate</span></a>
    </div>
  </header>
  
  <main class="thank-you-container">
    <div class="thank-you-icon">✓</div>
    <h1 class="thank-you-title">Thank You!</h1>
    <p class="thank-you-message">
      Thank You, <span class="user-name" id="userName"></span>! 
      Your message has been received. We will contact you shortly.
    </p>
    <a href="NexusGate International Website.html" class="home-btn">Back to Home</a>
  </main>
  
  <footer>
    <p>&copy; 2025 NexusGate International. All rights reserved.</p>
    <p>Connecting Global Industries to Africa's Most Promising Opportunities</p>
  </footer>

  <script>
    // Get user name from URL and display
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const userName = urlParams.get('name') || 'User';
      document.getElementById('userName').textContent = userName;
    });
  </script>
</body>
</html>
